services:
  postgres:
    image: postgres:16-alpine
    container_name: founderlink-postgres
    environment:
      POSTGRES_DB: school
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d school"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - founderlink-net

  redis:
    image: redis:7-alpine
    container_name: founderlink-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - founderlink-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: founderlink-rabbitmq
    command: sh -c "rabbitmq-plugins enable --offline rabbitmq_stomp && rabbitmq-server"
    ports:
      - "5672:5672"
      - "15672:15672"
      - "61613:61613"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - founderlink-net

  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: founderlink-zipkin
    ports:
      - "9411:9411"
    networks:
      - founderlink-net

  config-server:
    build:
      context: ./config-server
    container_name: founderlink-config-server
    environment:
      SERVER_PORT: 8888
    ports:
      - "8888:8888"
    networks:
      - founderlink-net

  eureka-server:
    build:
      context: ./eureka-server
    container_name: founderlink-eureka-server
    environment:
      SERVER_PORT: 8761
      EUREKA_INSTANCE_HOSTNAME: eureka-server
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      config-server:
        condition: service_started
    ports:
      - "8761:8761"
    networks:
      - founderlink-net

  auth-service:
    build:
      context: ./auth-service
    container_name: founderlink-auth-service
    environment:
      SERVER_PORT: 8081
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/school
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
    ports:
      - "8081:8081"
    networks:
      - founderlink-net

  user-service:
    build:
      context: ./user-service
    container_name: founderlink-user-service
    environment:
      SERVER_PORT: 8082
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/school
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
    ports:
      - "8082:8082"
    networks:
      - founderlink-net

  startup-service:
    build:
      context: ./startup-service
    container_name: founderlink-startup-service
    environment:
      SERVER_PORT: 8083
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/school
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      FILE_UPLOAD_DIR: /app/uploads
    volumes:
      - startup-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
    ports:
      - "8083:8083"
    networks:
      - founderlink-net

  investment-service:
    build:
      context: ./investment-service
    container_name: founderlink-investment-service
    environment:
      SERVER_PORT: 8084
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/school
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
    ports:
      - "8084:8084"
    networks:
      - founderlink-net

  team-service:
    build:
      context: ./team-service
    container_name: founderlink-team-service
    environment:
      SERVER_PORT: 8085
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/school
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
    ports:
      - "8085:8085"
    networks:
      - founderlink-net

  messaging-service:
    build:
      context: ./messaging-service
    container_name: founderlink-messaging-service
    environment:
      SERVER_PORT: 8086
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/school
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
    ports:
      - "8086:8086"
    networks:
      - founderlink-net

  notification-service:
    build:
      context: ./notification-service
    container_name: founderlink-notification-service
    environment:
      SERVER_PORT: 8087
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
    ports:
      - "8087:8087"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - founderlink-net

  api-gateway:
    build:
      context: ./api-gateway
    container_name: founderlink-api-gateway
    environment:
      SERVER_PORT: 8080
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      SERVICES_AUTH_URL: http://auth-service:8081
      SERVICES_USER_URL: http://user-service:8082
      SERVICES_STARTUP_URL: http://startup-service:8083
      SERVICES_INVESTMENT_URL: http://investment-service:8084
      SERVICES_TEAM_URL: http://team-service:8085
      SERVICES_MESSAGING_URL: http://messaging-service:8086
      SERVICES_NOTIFICATION_URL: http://notification-service:8087
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      startup-service:
        condition: service_started
      investment-service:
        condition: service_started
      team-service:
        condition: service_started
      messaging-service:
        condition: service_started
      notification-service:
        condition: service_started
    ports:
      - "8080:8080"
    networks:
      - founderlink-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: founderlink-frontend
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "3000:80"
    networks:
      - founderlink-net

networks:
  founderlink-net:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  startup-uploads:
