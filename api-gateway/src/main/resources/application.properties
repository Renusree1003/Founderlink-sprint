server.port=8080
spring.application.name=api-gateway

# ========================
# Eureka Configuration
# ========================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# ========================
# Enable Service Discovery
# ========================
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ========================
# Logging (optional debug)
# ========================
logging.level.org.springframework.cloud.gateway=DEBUG

# ========================
# AUTH SERVICE (NO JWT FILTER)
# ========================
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth-service/**

# Rewrite path
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/auth-service/(?<segment>.*), /${segment}

# ========================
# USER SERVICE (JWT PROTECTED)
# ========================
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/user-service/**

spring.cloud.gateway.routes[1].filters[0]=RewritePath=/user-service/(?<segment>.*), /${segment}
spring.cloud.gateway.routes[1].filters[1]=JwtAuthenticationFilter

# ========================
# STARTUP SERVICE (JWT PROTECTED)
# ========================
spring.cloud.gateway.routes[2].id=startup-service
spring.cloud.gateway.routes[2].uri=lb://STARTUP-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/startup-service/**

spring.cloud.gateway.routes[2].filters[0]=RewritePath=/startup-service/(?<segment>.*), /${segment}
spring.cloud.gateway.routes[2].filters[1]=JwtAuthenticationFilter

# ========================
# INVESTMENT SERVICE (OPTIONAL)
# ========================
spring.cloud.gateway.routes[3].id=investment-service
spring.cloud.gateway.routes[3].uri=lb://INVESTMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/investment-service/**

spring.cloud.gateway.routes[3].filters[0]=RewritePath=/investment-service/(?<segment>.*), /${segment}
spring.cloud.gateway.routes[3].filters[1]=JwtAuthenticationFilter

# ========================
# SWAGGER (IMPORTANT)
# ========================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Fix for gateway swagger loading
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config