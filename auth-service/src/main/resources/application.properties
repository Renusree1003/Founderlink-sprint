# ===============================
# BASIC CONFIG
# ===============================
spring.application.name=auth-service
server.port=8081

# ===============================
# CONFIG SERVER
# ===============================
spring.config.import=optional:configserver:http://localhost:8888

# ===============================
# DATABASE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/school
spring.datasource.username=postgres
spring.datasource.password=root

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# EUREKA CLIENT
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# ===============================
# SWAGGER (\uD83D\uDD25 FIXED)
# ===============================
springdoc.api-docs.path=/v3/api-docs

# disable default petstore
springdoc.swagger-ui.disable-swagger-default-url=true

# IMPORTANT: load via gateway
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth-service/v3/api-docs