spring.application.name=investment-service

server.port=${SERVER_PORT:8084}


# Config Server
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

# DB
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/school}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# JWT
security.jwt.secret=${SECURITY_JWT_SECRET:change-this-jwt-key-before-production-12345}

# Stripe API Keys (Get these from Stripe Dashboard)
stripe.api.key=${STRIPE_API_KEY:replace-with-stripe-key-in-env}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:replace-with-stripe-webhook-secret-in-env}

# Frontend URL for redirects
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}


